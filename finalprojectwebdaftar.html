<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Bootstrap Example</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </head>
    <body class="bg-gradient-to-b from-sky-400/50 via-sky-200/30 to-transparent min-h-screen">
        <!-- Navbar -->
        <nav class="navbar navbar-expand-sm bg-success navbar-light">
            <div class="container-fluid">
                <a class="navbar-brand font-serif text-emerald-300 hover:text-emerald-400" href="finalprojectweb.html">MyExcellentSkills</a>
                <div class="d-flex justify-content-end">
                    <button class="btn btn-outline-light">Masuk</button>
                    <button class="btn bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-3 ms-2 rounded">Daftar</button>
                </div>
            </div>
        </nav>
        <div class="container mt-3 border border-1 shadow p-4 mb-4 bg-white">
            <h2>Daftar Form</h2>
            <form action="/action_page.php">
                <div class="mb-3 mt-3">
                    <label for="email">Email:</label>
                    <input type="email" class="form-control" id="email" placeholder="Enter email" name="email">
                </div>
                <div class="mb-3">
                    <label for="pwd">Password:</label>
                    <input type="password" class="form-control" id="pwd" placeholder="Enter password" name="pswd">
                </div>
                <div class="form-check mb-3">
                    <label class="form-check-label">
                    <input class="form-check-input" type="checkbox" name="remember"> Remember me
                </label>
                </div>
                <button type="submit" class="btn btn-primary">Submit</button>
            </form>
        </div>
    </body>
</html>
